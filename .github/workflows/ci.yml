name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run Tests
        shell: pwsh
        run: |
          Invoke-Pester -Path tests/ -Output Detailed -Passthru

  lint-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSONC profiles
        shell: pwsh
        run: |
          $errors = 0
          Get-ChildItem profiles/*/opencode.jsonc | ForEach-Object {
            try {
              $content = Get-Content $_.FullName -Raw
              $null = $content | ConvertFrom-Json
              Write-Host "✅ $($_.Name)"
            } catch {
              Write-Host "❌ $($_.Name): $_"
              $errors++
            }
          }
          if ($errors) { exit 1 }

  check-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded absolute paths
        shell: pwsh
        run: |
          $errors = 0
          Get-ChildItem commands/*.md | ForEach-Object {
            $content = Get-Content $_.FullName
            if ($content -match 'C:\\Users') {
              Write-Host "❌ $($_.Name) contains absolute path"
              $errors++
            }
          }
          if ($errors) {
            Write-Host "Found hardcoded paths — use relative paths instead"
            exit 1
          }
          Write-Host "✅ All paths are relative"
